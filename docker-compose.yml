services:
  db:
    image: pgvector/pgvector:pg16
    container_name: find_your_crew_db
    restart: always
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 2G  
        reservations:
          memory: 512M
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: find_your_crew
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data 

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: find_your_crew_backend
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env  
    environment:
      - DB_HOST=db
      - PORT=5001
      - FRONTEND_ORIGIN=http://localhost:5173
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
